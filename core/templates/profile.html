{% extends "base.html" %}
{% load static %}
{% block content %}

<section class="min-h-screen flex bg-gray-900 text-white">

    <!-- 🔵 SIDEBAR -->
    <div class="w-64 bg-white/5 backdrop-blur-lg p-6 space-y-6">

        <h2 class="text-xl font-bold text-green-400">Dashboard</h2>

        <ul class="space-y-3">

            <li>
                <button onclick="showTab('profileTab', this)" 
                class="tab-btn w-full text-left p-3 rounded-lg hover:bg-green-500/20 flex items-center gap-2">
                    👤 Profile
                </button>
            </li>

            <li>
                <button onclick="showTab('editTab', this)" 
                class="tab-btn w-full text-left p-3 rounded-lg hover:bg-green-500/20 flex items-center gap-2">
                    ✏️ Edit Profile
                </button>
            </li>

            <li>
                <button onclick="showTab('historyTab', this)" 
                class="tab-btn w-full text-left p-3 rounded-lg hover:bg-green-500/20 flex items-center gap-2">
                    📊 History
                </button>
            </li>

        </ul>

        <a href="{% url 'home' %}" 
        class="block mt-10 text-green-400 hover:underline">
            ⬅ Back Home
        </a>

    </div>

    <!-- 🔶 MAIN CONTENT -->
    <div class="flex-1 p-10">

        <!-- 👤 PROFILE VIEW -->
        <div id="profileTab">

            <div class="bg-white/10 p-10 rounded-2xl max-w-md mx-auto text-center shadow-xl">

                <img src="{{ user.profile.image.url }}"
                class="w-28 h-28 rounded-full mx-auto border-4 border-green-400 object-cover shadow-lg">

                <h2 class="text-2xl font-bold mt-4">{{ user.username }}</h2>

                <p class="text-gray-400">{{ user.email }}</p>

                <p class="mt-4 text-gray-300">
                    📞 {{ user.profile.contact }}
                </p>

            </div>

        </div>

        <!-- ✏️ EDIT PROFILE -->
        <div id="editTab" class="hidden">

            <form method="POST" enctype="multipart/form-data"
            class="bg-white/10 p-8 rounded-2xl max-w-md mx-auto space-y-4">
                {% csrf_token %}

                <div>
                    <label class="text-sm text-gray-300">Username</label>
                    <input type="text" name="username" value="{{ user.username }}"
                    class="w-full p-3 rounded bg-gray-800 mt-1">
                </div>

                <div>
                    <label class="text-sm text-gray-300">Email</label>
                    <input type="email" name="email" value="{{ user.email }}"
                    class="w-full p-3 rounded bg-gray-800 mt-1">
                </div>

                <div>
                    <label class="text-sm text-gray-300">Contact</label>
                    <input type="text" name="contact" value="{{ user.profile.contact }}"
                    class="w-full p-3 rounded bg-gray-800 mt-1">
                </div>

                <div>
                    <label class="text-sm text-gray-300">Profile Image</label>
                    <input type="file" name="image"
                    class="w-full mt-1 text-sm text-gray-300">
                </div>

                <button class="w-full bg-green-500 py-3 rounded-xl hover:scale-105 transition font-semibold">
                    Save Changes
                </button>
            </form>

        </div>

        <!-- 📊 HISTORY -->
        <div id="historyTab" class="hidden">

            <div class="bg-white/10 p-8 rounded-2xl max-w-md mx-auto text-center">
                <h2 class="text-xl font-bold mb-4">📊 History</h2>
                <p class="text-gray-400">
                    No history yet (future feature)
                </p>
            </div>

        </div>

    </div>

</section>

<script src="{% static 'js/profile.js' %}"></script>
{% endblock %}
