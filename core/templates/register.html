{% load static %}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white flex items-center justify-center h-screen">

<div class="bg-white/10 backdrop-blur-lg p-10 rounded-2xl shadow-xl w-96">

    <h2 class="text-3xl font-bold text-center mb-6">Create Account</h2>

    <form method="POST" class="space-y-4">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username"
        class="w-full p-3 rounded-lg bg-gray-800 border border-gray-600">

        <input type="email" name="email" placeholder="Email"
        class="w-full p-3 rounded-lg bg-gray-800 border border-gray-600">

        <input type="password" name="password" placeholder="Password"
        class="w-full p-3 rounded-lg bg-gray-800 border border-gray-600">

        <button type="submit"
        class="w-full bg-green-500 py-3 rounded-lg hover:scale-105 transition">
            Register
        </button>
    </form>

    <p class="text-center mt-4 text-gray-400">
        Already have account?
        <a href="{% url 'login' %}" class="text-green-400">Login</a>
    </p>

</div>

</body>
</html>
